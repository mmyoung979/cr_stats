services:
    backend:
        build:
            context: ./backend
            dockerfile: ./Dockerfile
        container_name: backend
        depends_on:
            - postgres
        environment:
            API_KEY: ${API_KEY}
            DB_HOST: ${DB_HOST}
            DB_NAME: ${DB_NAME}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
        networks:
            - cr_stats
        ports:
            - 5001:5001
        restart: always
        volumes:
            - type: bind
              source: ./backend
              target: /usr/src
    postgres:
        container_name: postgres
        environment:
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        image: postgres:17.5
        networks:
            - cr_stats
        ports:
            - 5432:5432
        restart: always
        volumes:
            - type: volume
              source: postgres_data
              target: /var/lib/postgresql/data
    server:
        build:
            context: ./server
            dockerfile: ./Dockerfile
        container_name: server
        depends_on:
            - backend
        networks:
            - cr_stats
        ports:
            - 80:80
            - 443:443
        restart: always
        volumes:
            - ./frontend/build:/var/www/html
            - ./server/default.conf:/etc/nginx/sites-available/default
networks:
    cr_stats:
        driver: bridge
        name: cr_stats
volumes:
    postgres_data:
